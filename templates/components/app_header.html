<header class="app-header">
    <nav aria-label="App">
        <a href="/app" class="brand-mark" aria-label="{{ app_name }} home">
            <img src="/static/images/logo.svg" alt="" width="28" height="28">
            <span><span class="brand-light">Transact</span><span class="brand-heavy">Vault</span></span>
        </a>

        <ul class="app-nav" role="list">
            <li><a href="/app" {% if header.active_nav == "dashboard" %}class="active" aria-current="page"{% endif %}>Dashboard</a></li>
            <li><a href="/app/transactions" {% if header.active_nav == "transactions" %}class="active" aria-current="page"{% endif %}>Transactions</a></li>
            <li><a href="/app/search" {% if header.active_nav == "search" %}class="active" aria-current="page"{% endif %}>Search</a></li>
            {% if header.role.is_broker() %}
                <li><a href="/app/team" {% if header.active_nav == "team" %}class="active" aria-current="page"{% endif %}>Team</a></li>
            {% endif %}
        </ul>

        <section class="user-menu" aria-label="Account">
            <section class="user-meta">
                <p class="user-name">{{ header.user_name }}</p>
                <p class="user-role">{{ header.role.label() }}</p>
                <p class="user-brokerage">{{ header.brokerage_name }}</p>
            </section>
            <span class="avatar" aria-hidden="true">{{ header.user_initials }}</span>
            <form method="post" action="/logout" class="signout-form">
                <button type="submit" class="signout-link">Sign Out</button>
            </form>
        </section>
    </nav>
</header>
