services:
  # Every host port and bind address is driven by env vars so prod can rebind
  # or hide them without forking the compose file.
  #
  #   Dev (defaults):   app on 0.0.0.0:37420, services on 127.0.0.1:37421-37423
  #   Prod (Dokploy):   set *_BIND to 127.0.0.1 and *_PORT to unused ports,
  #                     or set them to ports you've reserved.

  surrealdb:
    image: surrealdb/surrealdb:v3
    restart: unless-stopped
    # Run as root in the container. The `surrealdb` image's non-root default
    # collides with named-volume ownership on some Docker hosts (Dokploy
    # included) — root always has write permission on /data. The container
    # is the isolation boundary, not the in-container UID, so this is safe.
    user: "0:0"
    # SurrealDB reads SURREAL_USER / SURREAL_PASS from its own container env
    # as fallbacks for the --user / --pass flags. Putting them in
    # `environment:` means they travel with the container image regardless of
    # how the compose orchestrator handles ${...} substitution at up-time.
    environment:
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:-root}
    command:
      - start
      - --bind=0.0.0.0:8000
      - rocksdb:///data/tv.db
    # No host port mapping. The app reaches SurrealDB at `ws://surrealdb:8000`
    # on the internal compose network. Other SurrealDB instances on the same
    # Dokploy host are invisible — they live in their own compose networks.
    expose:
      - "8000"
    volumes:
      - surreal-data:/data

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    # Same reasoning as surrealdb — sidestep the host-volume UID clash.
    user: "0:0"
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
    # No host port mappings either — only the app (on the internal network)
    # talks to rustfs, and only via `http://rustfs:9000`.
    expose:
      - "9000"
      - "9001"
    volumes:
      - rustfs-data:/data
    # Let the app wait until the S3 endpoint is actually responsive, not just
    # when the container process has started. RustFS spends several seconds
    # warming up (loading policies, initialising the IAM store, etc.) before
    # its first request will succeed.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --tries=1 --timeout=2 http://127.0.0.1:9000/ 2>&1 | grep -q 'xml\\|Error\\|AccessDenied' || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  transactvault:
    build: .
    depends_on:
      surrealdb:
        condition: service_started
      rustfs:
        condition: service_healthy
    restart: unless-stopped
    # `expose` (vs `ports`) means the container is only reachable on the
    # internal docker network. Traefik reaches it via the dokploy-network
    # and does the TLS termination; there's no need to publish a host port.
    # This also keeps Dokploy from auto-generating a Traefik label pointing
    # at the wrong host-side port.
    expose:
      - "37420"
    environment:
      # Server
      APP_NAME: ${APP_NAME:-TransactVault}
      BASE_URL: ${BASE_URL:-http://localhost:37420}
      HOST: 0.0.0.0
      PORT: "37420"
      PRETTY_LOGS: ${PRETTY_LOGS:-false}
      RUST_LOG: ${RUST_LOG:-info,transactvault=info}

      # SurrealDB — URL is fixed to the compose service DNS; credentials
      # come from the same env that the surrealdb container was started with.
      SURREAL_URL: ws://surrealdb:8000
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:-root}
      SURREAL_NS: ${SURREAL_NS:-transactvault}
      SURREAL_DB: ${SURREAL_DB:-app}

      # RustFS — endpoint is fixed; credentials must match what rustfs
      # was initialized with.
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_REGION: ${RUSTFS_REGION:-us-east-1}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-transactvault}

      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-168}

      # Resend
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-TransactVault <no-reply@transactvault.example>}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}

volumes:
  surreal-data:
  rustfs-data:
